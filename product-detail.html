<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>產品詳情 - PLASTIC_JUNKIE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <a href="index.html" class="logo">PLASTIC_JUNKIE</a>
            <span class="subtitle">塑膠模型資料庫</span>
        </div>
    </header>

    <main>
        <div class="product-detail" id="product-detail">
            <!-- Loaded by JS -->
        </div>
    </main>

    <footer class="site-footer">
        <p>&copy; 2026 PLASTIC_JUNKIE. All product names and images are trademarks of their respective owners.</p>
    </footer>

    <script src="data.js"></script>
    <script src="series.js"></script>
    <script>
        // Parse URL params
        const params = new URLSearchParams(window.location.search);
        const series = params.get('series');
        const id = params.get('id');

        const products = GUNDAM_DATA[series] || [];
        const product = products.find(p => p.no === id);

        const container = document.getElementById('product-detail');

        if (!product) {
            container.innerHTML = `
                <a href="series-${(series || 'mg').toLowerCase()}.html" class="back-link">← 返回系列列表</a>
                <p style="text-align:center;padding:60px;color:var(--text-muted)">找不到該產品。</p>`;
        } else {
            const seriesPage = series.toLowerCase().replace('megasize','megasize');
            const detailImages = product.images.detail || [];
            const allImages = [
                { label: '盒面圖', src: product.images.box },
                { label: '正面圖', src: product.images.front },
                { label: '背面圖', src: product.images.back },
                ...detailImages.map((src, i) => ({ label: `細節圖 ${i+1}`, src }))
            ].filter(img => img.src);

            container.innerHTML = `
                <a href="series-${seriesPage}.html" class="back-link">← 返回 ${series} 系列</a>

                <h1 style="font-size:24px;font-weight:900;margin-bottom:4px">${product.no} ${product.name}</h1>
                <div class="product-name-en">${product.name_jp || ''}</div>

                <div class="product-info-bar">
                    <div class="info-item"><span class="info-label">系列</span><span class="info-value">${series}</span></div>
                    <div class="info-item"><span class="info-label">發售日</span><span class="info-value">${product.release || '-'}</span></div>
                    <div class="info-item"><span class="info-label">定價</span><span class="info-value">¥${(product.price || 0).toLocaleString()}</span></div>
                </div>

                ${allImages.length > 0 ? `
                <h2 style="font-size:16px;margin-bottom:12px">圖片集</h2>
                <div class="image-gallery">
                    ${allImages.map(img => `
                        <div class="gallery-item">
                            <img src="${img.src}" alt="${img.label}" loading="lazy">
                        </div>
                    `).join('')}
                </div>
                ` : `
                <div style="text-align:center;padding:60px;color:var(--text-muted)">暫無圖片，待日後加入。</div>
                `}
            `;
        }
    </script>
</body>
</html>
